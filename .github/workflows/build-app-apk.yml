name: Build RecompOS APK

# Builds the single native RecompOS Android app: a thin Capacitor shell that
# loads the live web app from Vercel (so UI/logic updates arrive over the air
# with no reinstall) and adds the Health Connect plugin for OnePlus Watch data.
# You only need to reinstall this APK when NATIVE bits change (plugins, config) —
# everyday updates come straight from Vercel.

on:
  push:
    branches: [main]
    paths:
      - "svelte-recomp/capacitor.config.json"
      - "svelte-recomp/android/**"
      - ".github/workflows/build-app-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: svelte-recomp
    env:
      # Public, non-secret values (URL + publishable key). Only used so the
      # offline-fallback bundle builds; the real app is served from Vercel.
      PUBLIC_SUPABASE_URL: https://jerbhsasccvjelkkphgu.supabase.co
      PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_H8G1aDyFJFLmgxrTc8qKeA_kxyXRLyk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm ci

      - name: Build static web bundle (Capacitor target)
        run: BUILD_TARGET=capacitor npm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: svelte-recomp/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk recompos.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recompos-apk
          path: svelte-recomp/recompos.apk
          if-no-files-found: error

      - name: Publish to a Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: recompos-app-latest
          name: RecompOS (Android app)
          body: |
            The full RecompOS app as a native Android APK.
            It loads the live app from Vercel (updates arrive automatically — no
            reinstall) and adds OnePlus Watch health data via Health Connect.

            Install once, sign in, grant Health Connect permissions. You only need
            to reinstall when this release changes (native updates).
          files: svelte-recomp/recompos.apk
          fail_on_unmatched_files: true
