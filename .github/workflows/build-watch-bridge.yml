name: Build Watch Bridge APK

# Builds the RecompOS Watch Sync Android bridge (Capacitor + Health Connect)
# and publishes a debug APK you can sideload onto your phone.

on:
  push:
    branches: [main]
    paths:
      - "watch-bridge/**"
      - ".github/workflows/build-watch-bridge.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: watch-bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies (fresh resolve from npmjs)
        run: |
          rm -f package-lock.json
          npm install --registry=https://registry.npmjs.org

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Build debug APK
        working-directory: watch-bridge/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p ../out
          cp android/app/build/outputs/apk/debug/app-debug.apk ../recompos-watch-sync.apk
          ls -la ../recompos-watch-sync.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: recompos-watch-sync-apk
          path: watch-bridge/recompos-watch-sync.apk
          if-no-files-found: error

      - name: Publish to a Release (stable download link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: watch-bridge-latest
          name: RecompOS Watch Sync (latest)
          body: |
            Debug APK for the OnePlus Watch → RecompOS Health Connect bridge.
            Sideload this on your phone, sign in with your RecompOS account,
            grant Health Connect permissions, and tap Sync.
          files: watch-bridge/recompos-watch-sync.apk
          fail_on_unmatched_files: true
