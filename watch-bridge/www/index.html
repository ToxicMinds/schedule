<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>RecompOS Watch Sync</title>
  <style>
    :root { --bg:#0e1117; --bg2:#161b22; --bg3:#1c232d; --border:#2a3038; --text:#e8edf2; --muted:#8b97a7; --amber:#f5a623; --green:#2ecc71; --red:#e74c3c; --blue:#4aa3ff; }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--text); padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 20px); }
    h1 { font-size:20px; margin:18px 0 2px; display:flex; align-items:center; gap:8px; }
    .sub { color:var(--muted); font-size:13px; margin-bottom:16px; }
    .card { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
    input, select { width:100%; padding:11px 12px; border-radius:9px; border:1px solid var(--border); background:var(--bg3); color:var(--text); font-size:15px; margin-bottom:12px; }
    button { width:100%; padding:13px; border:none; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
    .btn-primary { background:linear-gradient(135deg,var(--amber),#e8890b); color:#1a1200; }
    .btn-primary:disabled { opacity:.5; }
    .btn-ghost { background:var(--bg3); color:var(--text); border:1px solid var(--border); margin-top:8px; }
    .row { display:flex; gap:8px; align-items:center; }
    .pill { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; padding:4px 10px; border-radius:999px; background:var(--bg3); border:1px solid var(--border); }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); }
    .dot.ok { background:var(--green); } .dot.err { background:var(--red); } .dot.warn { background:var(--amber); }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:6px; }
    .stat { background:var(--bg3); border-radius:9px; padding:10px; text-align:center; }
    .stat .v { font-size:19px; font-weight:800; } .stat .l { font-size:10px; color:var(--muted); text-transform:uppercase; }
    #log { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:11px; color:var(--muted); background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:10px; max-height:190px; overflow-y:auto; white-space:pre-wrap; line-height:1.5; }
    .hidden { display:none; }
    .muted { color:var(--muted); font-size:12px; }
    a { color:var(--blue); }
  </style>
</head>
<body>
  <h1>⌚ RecompOS Watch Sync</h1>
  <div class="sub">Reads steps, sleep &amp; heart rate from Health Connect and syncs them to your RecompOS account.</div>

  <div class="card">
    <div class="row" style="justify-content:space-between">
      <span class="pill"><span class="dot" id="hc-dot"></span><span id="hc-status">Health Connect: checking…</span></span>
      <span class="pill"><span class="dot" id="auth-dot"></span><span id="auth-status">Signed out</span></span>
    </div>
  </div>

  <!-- Login -->
  <div class="card" id="login-card">
    <label for="email">RecompOS email</label>
    <input id="email" type="email" autocomplete="username" inputmode="email" placeholder="you@example.com" />
    <label for="pass">Password</label>
    <input id="pass" type="password" autocomplete="current-password" placeholder="••••••••" />
    <button class="btn-primary" id="login-btn">Sign in</button>
    <div class="muted" id="login-msg" style="margin-top:8px"></div>
  </div>

  <!-- Sync -->
  <div class="card hidden" id="sync-card">
    <label for="days">Sync window</label>
    <select id="days">
      <option value="7">Last 7 days</option>
      <option value="14">Last 14 days</option>
      <option value="30">Last 30 days</option>
    </select>
    <button class="btn-primary" id="sync-btn">Sync now</button>
    <button class="btn-ghost" id="perm-btn">Grant / re-check Health Connect access</button>
    <button class="btn-ghost" id="signout-btn">Sign out</button>

    <div class="stat-grid" id="stats" style="margin-top:14px">
      <div class="stat"><div class="v" id="s-days">–</div><div class="l">days synced</div></div>
      <div class="stat"><div class="v" id="s-steps">–</div><div class="l">step-days</div></div>
      <div class="stat"><div class="v" id="s-sleep">–</div><div class="l">sleep nights</div></div>
      <div class="stat"><div class="v" id="s-hr">–</div><div class="l">HR/HRV days</div></div>
    </div>
  </div>

  <div class="card">
    <label>Activity log</label>
    <div id="log">Ready.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
