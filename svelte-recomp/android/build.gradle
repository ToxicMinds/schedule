// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.9.1'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// The @kiwi-health/capacitor-health-connect plugin pins Kotlin 1.8.20, which
// cannot target JVM 21. Capacitor 7 modules require JDK 21 to build, which makes
// AGP push every Kotlin task to jvmTarget 21. Pin any Kotlin module back to 17
// (its declared Java target) so the old Kotlin compiler is happy.
subprojects {
    afterEvaluate { proj ->
        if (proj.hasProperty('android') && proj.android.hasProperty('kotlinOptions')) {
            proj.android.kotlinOptions.jvmTarget = '17'
        }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
