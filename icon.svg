<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="#0e1117"/>

  <!-- Dumbbell bar -->
  <rect x="116" y="236" width="280" height="40" rx="8" fill="#f59e0b"/>

  <!-- Left outer weight -->
  <rect x="60" y="188" width="60" height="136" rx="14" fill="#f59e0b"/>
  <!-- Left inner weight -->
  <rect x="112" y="206" width="32" height="100" rx="8" fill="#d97706"/>

  <!-- Right outer weight -->
  <rect x="392" y="188" width="60" height="136" rx="14" fill="#f59e0b"/>
  <!-- Right inner weight -->
  <rect x="368" y="206" width="32" height="100" rx="8" fill="#d97706"/>

  <!-- Bar center highlight -->
  <rect x="116" y="236" width="280" height="14" rx="7" fill="#fbbf24" opacity="0.6"/>

  <!-- Small progress arc (subtle — bottom right) -->
  <circle cx="370" cy="370" r="60" fill="none" stroke="#1e2436" stroke-width="12"/>
  <circle cx="370" cy="370" r="60" fill="none" stroke="#34d399" stroke-width="10"
    stroke-dasharray="251" stroke-dashoffset="63"
    stroke-linecap="round"
    transform="rotate(-90 370 370)"/>
  <text x="370" y="378" font-size="28" font-weight="800" fill="#34d399"
    text-anchor="middle" font-family="-apple-system,sans-serif">87%</text>
</svg>
